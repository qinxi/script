#!name=Duolingo Premium Unlock
#!desc=多邻国 Premium 订阅伪装解锁 (针对小火箭环境优化)
#!author=qinxi
#!system=ios

[MITM]
hostname = %APPEND% *.duolingo.com, *.duolingo.cn

[Script]
# 核心修改：使用 http-request 并在拦截期短路请求
# 必须带上 requires-body=1，因为 batch 接口通常是 POST 请求，脚本需要透传 body
Duolingo_Premium = type=http-request, pattern=^https:\/\/.*\.duolingo\.[^\/]+\/[0-9]{4}-[0-9]{2}-[0-9]{2}\/batch, requires-body=1, max-size=3145728, timeout=30, script-path=https://raw.githubusercontent.com/qinxi/script/refs/heads/master/quantumult-x/scripts/duolingo_app_sub.js1 
